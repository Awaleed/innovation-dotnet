apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: innovation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: [sh, -c, "while ! nc -z postgres 5432; do sleep 2; done"]
        - name: wait-for-ldap
          image: busybox:1.36
          command: [sh, -c, "while ! nc -z openldap 389; do sleep 2; done"]
      containers:
        - name: keycloak
          image: KC_IMAGE_PLACEHOLDER
          args: ["start-dev", "--import-realm"]
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9000, name: management }
          env:
            - { name: KC_HEALTH_ENABLED, value: "true" }
            - { name: KC_HTTP_ENABLED, value: "true" }
            - { name: KC_PROXY_HEADERS, value: "xforwarded" }
            - { name: KC_HOSTNAME, value: "https://AUTH_DOMAIN_PLACEHOLDER" }
            - { name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC, value: "true" }
            - { name: KC_DB, value: "postgres" }
            - { name: KC_DB_URL, value: "jdbc:postgresql://postgres:5432/innovationdb" }
            - { name: KC_DB_USERNAME, value: "postgres" }
            - { name: KC_DB_PASSWORD, valueFrom: { secretKeyRef: { name: innovation-secrets, key: postgres-password } } }
            - { name: KC_FEATURES, value: "docker,token-exchange" }
            - { name: KEYCLOAK_ADMIN, value: "admin" }
            - { name: KEYCLOAK_ADMIN_PASSWORD, valueFrom: { secretKeyRef: { name: innovation-secrets, key: keycloak-password } } }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://dashboard:18889" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "grpc" }
            - { name: OTEL_SERVICE_NAME, value: "keycloak" }
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1536Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: innovation
spec:
  type: ClusterIP
  selector:
    app: keycloak
  ports:
    - { port: 8080, targetPort: 8080, name: http }
    - { port: 9000, targetPort: 9000, name: management }
