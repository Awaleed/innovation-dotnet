apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: innovation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: [sh, -c, "while ! nc -z postgres 5432; do sleep 2; done"]
        - name: wait-for-keycloak
          image: busybox:1.36
          command: [sh, -c, "while ! nc -z keycloak 8080; do sleep 2; done"]
      containers:
        - name: web
          image: WEB_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - { name: ASPNETCORE_FORWARDEDHEADERS_ENABLED, value: "true" }
            - { name: HTTP_PORTS, value: "8080" }
            - { name: ConnectionStrings__innovationdb, value: "Host=postgres;Port=5432;Database=innovationdb;Username=postgres;Password=PG_PWD_PLACEHOLDER" }
            - { name: ConnectionStrings__keycloak, value: "http://keycloak:8080" }
            - { name: ConnectionStrings__redis, value: "redis:6379,password=REDIS_PWD_PLACEHOLDER" }
            - { name: Keycloak__FrontendUrl, value: "https://AUTH_DOMAIN_PLACEHOLDER" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://dashboard:18889" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "grpc" }
            - { name: OTEL_SERVICE_NAME, value: "innovation-web" }
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: innovation
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 8080
      targetPort: 8080
