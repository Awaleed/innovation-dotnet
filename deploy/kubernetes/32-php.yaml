apiVersion: apps/v1
kind: Deployment
metadata:
  name: php
  namespace: innovation
  labels:
    app: php
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php
  template:
    metadata:
      labels:
        app: php
    spec:
      containers:
        - name: php
          image: PHP_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: innovation-secrets
                  key: app-key
            - name: APP_URL
              value: "https://DOMAIN_PLACEHOLDER"
            - name: APP_TIMEZONE
              value: "Asia/Riyadh"
            - name: APP_LOCALE
              value: "ar"
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: innovation
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innovation-secrets
                  key: postgres-password
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innovation-secrets
                  key: redis-password
            - name: SESSION_DRIVER
              value: redis
            - name: CACHE_STORE
              value: redis
            - name: QUEUE_CONNECTION
              value: redis
            - name: KEYCLOAK_BASE_URL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_REALM
              value: innovation
            - name: KEYCLOAK_CLIENT_ID
              value: innovation-php
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: innovation-secrets
                  key: keycloak-php-secret
            - name: KEYCLOAK_REDIRECT_URI
              value: "https://DOMAIN_PLACEHOLDER/sso/callback"
            - name: CURRENT_THEME
              value: custom
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: php
  namespace: innovation
spec:
  selector:
    app: php
  ports:
    - port: 8080
      targetPort: 8080
