apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: innovation-ingress
  namespace: innovation
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [DOMAIN_PLACEHOLDER, AUTH_DOMAIN_PLACEHOLDER]
      secretName: innovation-tls
  rules:
    # App traffic → Caddy (handles strangler fig routing between .NET and PHP)
    - host: DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: caddy
                port:
                  number: 80
    # Keycloak
    - host: AUTH_DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
